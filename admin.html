<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>命鏡 管理画面</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Shippori+Mincho+B1:wght@400;500;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c8a84b;--gold2:#e2c96e;--parch:#ede8e0;--deep:#0a0805;--surface:rgba(255,255,255,0.1);--border:rgba(200,168,75,0.35);}
body{font-family:'BIZ UDPGothic','Hiragino Kaku Gothic ProN',sans-serif;background:var(--deep);color:var(--parch);min-height:100vh;padding:0 0 80px;}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(200,168,75,0.1) 0%,transparent 70%),#0e0b07;}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px;}
.admin-header{text-align:center;padding:28px 0 20px;border-bottom:0.5px solid rgba(200,168,75,0.2);margin-bottom:22px;}
.admin-title{font-size:20px;font-weight:800;letter-spacing:.2em;color:var(--gold2);font-family:'Shippori Mincho B1','Hiragino Mincho ProN',serif;}
.admin-sub{font-size:10px;letter-spacing:.3em;color:rgba(220,200,150,0.85);margin-top:5px;}
.card{background:var(--surface);border:0.5px solid var(--border);padding:20px;position:relative;margin-bottom:14px;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,75,0.4),transparent);}
.sec-title{font-size:12px;letter-spacing:.25em;color:#dfc070;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:500;}
.sec-title::before,.sec-title::after{content:'';flex:1;height:0.5px;background:linear-gradient(90deg,rgba(200,168,75,0.3),transparent);}
.sec-title::after{background:linear-gradient(90deg,transparent,rgba(200,168,75,0.3));}
.lbl{font-size:11px;letter-spacing:.2em;color:#dfc070;display:block;margin-bottom:6px;font-weight:500;}
.inp{width:100%;background:rgba(255,255,255,0.1);border:0.5px solid rgba(200,168,75,0.5);border-radius:1px;padding:9px 13px;font-family:inherit;font-size:14px;color:#ede8e0;outline:none;transition:border-color .2s;margin-bottom:12px;}
.inp:focus{border-color:rgba(200,168,75,0.65);}
select.inp option{background:#0e0b07;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.btn{background:transparent;border:1px solid var(--gold);color:var(--gold2);font-family:inherit;font-size:13px;letter-spacing:.2em;padding:10px 20px;cursor:pointer;transition:all .25s;}
.btn:hover{background:rgba(200,168,75,0.08);}
.btn-full{width:100%;}
.btn-sm{background:transparent;border:0.5px solid rgba(210,185,110,0.5);color:rgba(235,215,155,1.0);font-family:inherit;font-size:11px;letter-spacing:.15em;padding:6px 12px;cursor:pointer;transition:all .2s;border-radius:1px;}
.btn-sm:hover{border-color:var(--gold);color:var(--gold2);}
.btn-danger{border-color:rgba(200,80,80,0.5);color:rgba(200,100,100,0.8);}
.btn-danger:hover{background:rgba(200,80,80,0.08);}
.btn-success{border-color:rgba(80,200,120,0.5);color:rgba(100,200,130,0.9);}
.btn-success:hover{background:rgba(80,200,120,0.08);}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:.1em;}
.badge-unpaid{background:rgba(200,80,80,0.15);color:rgba(220,100,100,0.9);border:0.5px solid rgba(200,80,80,0.3);}
.badge-paid{background:rgba(200,168,75,0.1);color:var(--gold2);border:0.5px solid rgba(200,168,75,0.3);}
.badge-written{background:rgba(80,150,200,0.15);color:rgba(100,170,220,0.9);border:0.5px solid rgba(80,150,200,0.3);}
.badge-provided{background:rgba(80,200,120,0.15);color:rgba(100,200,130,0.9);border:0.5px solid rgba(80,200,120,0.3);}
.request-list{display:flex;flex-direction:column;gap:7px;}
.request-item{background:rgba(255,255,255,0.06);border:0.5px solid rgba(200,168,75,0.15);padding:12px 14px;cursor:pointer;transition:all .2s;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;}
.request-item:hover{border-color:rgba(200,168,75,0.4);background:rgba(200,168,75,0.04);}
.request-item.active{border-color:var(--gold);background:rgba(200,168,75,0.06);}
.req-name{font-size:13px;font-weight:500;color:#ede8e0;}
.req-sub{font-size:10px;color:rgba(230,220,195,0.95);margin-top:2px;letter-spacing:.05em;}
.divhr{height:0.5px;background:linear-gradient(90deg,transparent,rgba(200,168,75,0.22),transparent);margin:14px 0;}
.status-btns{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.setting-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.setting-key{font-size:11px;color:rgba(235,225,195,0.95);min-width:140px;letter-spacing:.08em;}
.toast{position:fixed;bottom:24px;right:24px;background:rgba(200,168,75,0.92);color:#0a0805;padding:10px 20px;font-size:12px;letter-spacing:.1em;z-index:9999;display:none;font-family:inherit;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}
.login-box{background:var(--surface);border:0.5px solid var(--border);padding:36px;width:340px;text-align:center;}
.login-title{font-size:18px;font-weight:700;letter-spacing:.2em;color:var(--gold2);margin-bottom:5px;}
.login-sub{font-size:10px;letter-spacing:.3em;color:rgba(200,168,75,0.4);margin-bottom:24px;}
.login-err{font-size:12px;color:rgba(200,80,80,0.8);margin-top:8px;display:none;}

/* 龍入力テーブル */
.ryu-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px;}
.ryu-table th{padding:7px 6px;text-align:center;color:#dfc070;font-size:10px;letter-spacing:.1em;border-bottom:0.5px solid rgba(200,168,75,0.5);font-weight:500;white-space:nowrap;}
.ryu-table td{padding:5px 4px;border-bottom:0.5px solid rgba(200,168,75,0.1);vertical-align:middle;}
.ryu-table td:first-child{text-align:center;font-size:11px;font-weight:700;color:var(--gold2);width:28px;}
.ryu-sel{width:100%;background:rgba(255,255,255,0.05);border:0.5px solid rgba(200,168,75,0.25);color:var(--parch);font-family:inherit;font-size:11px;padding:5px 6px;outline:none;min-width:110px;}
.ryu-sel option{background:#0e0b07;}
.ryu-color-cell{width:120px;border-radius:2px;padding:5px 8px;text-align:center;font-size:11px;font-weight:500;transition:background .3s;}
.ryu-num{width:36px;text-align:center;background:rgba(255,255,255,0.04);border:0.5px solid rgba(200,168,75,0.2);color:var(--parch2);font-size:12px;padding:4px;}
.ryu-del{background:transparent;border:none;color:rgba(200,80,80,0.6);cursor:pointer;font-size:14px;padding:2px 6px;}
.ryu-del:hover{color:rgba(200,80,80,0.9);}
.ryu-add-btn{display:flex;align-items:center;gap:8px;margin-top:8px;}

<body>
<div class="bg"></div>

<!-- ログイン -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">命 鏡</div>
    <div class="login-sub">ADMIN — 管 理 画 面</div>
    <label class="lbl">管理者パスワード</label>
    <input class="inp" id="pw-input" type="password" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-full" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="login-err">パスワードが正しくありません</div>
  </div>
</div>

<!-- 管理画面 -->
<div id="admin-body" style="display:none;position:relative;z-index:1;">
<div class="wrap">
  <div class="admin-header">
    <div class="admin-title">命 鏡 — 管 理 画 面</div>
    <div class="admin-sub">UNMEI NO KAGAMI ADMIN</div>
  </div>

  <div style="display:grid;grid-template-columns:320px 1fr;gap:16px;">

    <!-- 左：依頼一覧 -->
    <div>
      <div class="card" style="max-height:680px;overflow-y:auto;">
        <div class="sec-title">鑑 定 依 頼 一 覧</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
          <button class="btn-sm" onclick="filterList('all')">全て</button>
          <button class="btn-sm" onclick="filterList('unpaid')">未入金</button>
          <button class="btn-sm" onclick="filterList('paid')">入金済</button>
          <button class="btn-sm" onclick="filterList('written')">未提供</button>
          <button class="btn-sm" onclick="filterList('provided')">提供済</button>
        </div>
        <div class="request-list" id="request-list">
          <div style="font-size:12px;color:rgba(200,168,75,0.4);text-align:center;padding:16px;">依頼はまだありません</div>
        </div>
      </div>

      <!-- 手動追加 -->
      <div class="card">
        <div class="sec-title">手 動 依 頼 追 加</div>
        <div class="form-row">
          <div><label class="lbl">お名前</label><input class="inp" id="t-name" type="text" placeholder="山田 花子"></div>
          <div><label class="lbl">シメイ（カナ）</label><input class="inp" id="t-kana" type="text" placeholder="ヤマダ ハナコ"></div>
        </div>
        <div class="form-row">
          <div><label class="lbl">生年月日</label><input class="inp" id="t-birth" type="date"></div>
          <div><label class="lbl">テーマ</label><input class="inp" id="t-theme" type="text" placeholder="仕事・恋愛など"></div>
        </div>
        <label class="lbl">連絡先</label>
        <input class="inp" id="t-contact" type="text" placeholder="email@example.com">
        <button class="btn btn-full" onclick="addRequest()">✦ 追 加 す る</button>
      </div>
    </div>

    <!-- 右：鑑定入力 -->
    <div>
      <div class="card">
        <div class="sec-title">鑑 定 入 力</div>
        <div id="detail-empty" style="font-size:12px;color:rgba(225,215,185,0.85);text-align:center;padding:24px;">左のリストから依頼を選んでください</div>
        <div id="detail-panel" style="display:none;">

          <div id="detail-info" style="font-size:12px;color:rgba(235,225,200,1.0);line-height:2;margin-bottom:12px;"></div>

          <!-- ステータス -->
          <div class="lbl">ステータス変更</div>
          <div class="status-btns">
            <button class="btn-sm badge-unpaid" onclick="changeStatus('unpaid')">未入金</button>
            <button class="btn-sm badge-paid" onclick="changeStatus('paid')">入金済・未入力</button>
            <button class="btn-sm badge-written" onclick="changeStatus('written')">入力済・未提供</button>
            <button class="btn-sm btn-success" onclick="provideKanteishi()">✦ 提 供 す る</button>
            <button class="btn-sm btn-danger" onclick="deleteRequest()">削除</button>
          </div>

          <div class="divhr"></div>

          <!-- 鑑定種別タブ -->
          <div style="display:flex;gap:8px;margin-bottom:16px;">
            <button class="btn-sm active" id="mode-ryu" onclick="setMode('ryu')">ツイてる龍鑑定</button>
            <button class="btn-sm" id="mode-text" onclick="setMode('text')">通常鑑定文</button>
          </div>

          <!-- ツイてる龍入力 -->
          <div id="ryu-panel">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
              <div style="font-size:11px;color:rgba(235,220,185,0.95);">龍を1体ずつ追加してください（最大42体）</div>
              <div style="font-size:11px;color:var(--gold2);" id="ryu-count-label">現在 0 体</div>
            </div>

            <div style="overflow-x:auto;">
              <table class="ryu-table" id="ryu-table">
                <thead>
                  <tr>
                    <th>#</th>
                    <th style="min-width:120px;">色</th>
                    <th style="min-width:100px;">色名</th>
                    <th>縁結び</th>
                    <th>金運上昇</th>
                    <th>癒し</th>
                    <th>浄化</th>
                    <th>結界</th>
                    <th>エネ調整</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="ryu-tbody"></tbody>
              </table>
            </div>

            <div class="ryu-add-btn">
              <button class="btn-sm" onclick="addRyu()" id="ryu-add-btn">✦ 龍を追加する</button>
              <span style="font-size:10px;color:rgba(225,215,185,0.9);">11体以上で2ページ目が追加されます</span>
            </div>

            <div class="divhr"></div>
            <label class="lbl">鑑定日</label>
            <input class="inp" id="ryu-date" type="date">
            <label class="lbl">一言メッセージ（任意）</label>
            <textarea class="inp" id="ryu-message" rows="3" placeholder="依頼者へのメッセージがあれば入力してください"></textarea>
          </div>

          <!-- 通常鑑定文入力 -->
          <div id="text-panel" style="display:none;">
            <label class="lbl">テーマ</label>
            <input class="inp" id="edit-theme" type="text" placeholder="例：仕事・使命">
            <label class="lbl">鑑定文</label>
            <div style="font-size:10px;color:rgba(200,168,75,0.4);margin-bottom:6px;line-height:1.7;">各段落を「古語の原文」＋改行＋「解説：現代語の解説」の二段構成で入力してください。段落間は空行で区切ってください。</div>
            <textarea class="inp" id="edit-text" rows="10" placeholder="春風やまず、心に花を咲かせよ。&#10;解説：あなたの中に眠る可能性は…"></textarea>
          </div>

          <div style="display:flex;gap:8px;margin-top:4px;">
            <button class="btn" onclick="saveKanteishi()">✦ 保 存 す る</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

// 輝度から文字色を決定
function getTextColor(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  return lum>0.5?'#111111':'#ffffff';
}

    if(data.ok){
      isLoggedIn=true;
      document.getElementById('login-screen').style.display='none';
      document.getElementById('admin-body').style.display='block';
      renderList();
    }else{
      document.getElementById('login-err').style.display='block';document.getElementById('login-err').textContent='パスワードが違います';
      document.getElementById('pw-input').value='';
    }
  }catch(e){
    document.getElementById('login-err').style.display='block';document.getElementById('login-err').textContent='認証エラー：'+e.message;
  }
}
function doLogout(){
  document.getElementById('admin-body').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pw-input').value='';
}

// ══════════════════════
// ユーティリティ
// ══════════════════════
function toast(msg,d=2500){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',d);}
function fmtDate(iso){if(!iso)return '';const d=new Date(iso);return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}

const STATUS_LABEL={unpaid:'未入金',paid:'入金済・未入力',written:'入力済・未提供',provided:'提供済'};
const STATUS_CLASS={unpaid:'badge-unpaid',paid:'badge-paid',written:'badge-written',provided:'badge-provided'};

// ══════════════════════
// データ管理
// ══════════════════════
// Supabaseからデータ取得
async function fetchFromSupabase(){
  try{
    const res=await fetch('https://unmei-chatwork.mitzuryu-happinessroom.workers.dev/supabase/list',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({})
    });
    const data=await res.json();
    if(Array.isArray(data))return data.map(r=>mapRow(r));
  }catch(e){console.log('Supabase fetch error',e);}
  return [];
}

function mapRow(r){
  return{
    birthKey:r.birth_key||'',
    name:r.name||'不明',
    kana:r.kana||'',
    contact:r.contact||'',
    theme:r.theme||'',
    requestedAt:r.requested_at||r.created_at||'',
    status:r.status||'unpaid',
    ryuList:r.ryu_list||[],
    text:r.text||'',
    editTheme:r.edit_theme||'',
    mode:r.mode||'ryu',
    ryuDate:r.ryu_date||'',
    ryuMessage:r.ryu_message||''
  };
}

function buildMasterList(){
  return window._supabaseList||[];
}

// ══════════════════════
// リスト表示
// ══════════════════════
let currentFilter='all', currentBirthKey=null, currentMode='ryu';

function filterList(f){currentFilter=f;renderList();}
async function renderList(){
  window._supabaseList=await fetchFromSupabase();
  const list=buildMasterList();
  const filtered=currentFilter==='all'?list:list.filter(r=>r.status===currentFilter);
  const el=document.getElementById('request-list');
  if(!filtered.length){el.innerHTML='<div style="font-size:12px;color:rgba(200,168,75,0.4);text-align:center;padding:16px;">該当する依頼はありません</div>';return;}
  el.innerHTML=filtered.map(r=>`
    <div class="request-item${r.birthKey===currentBirthKey?' active':''}" onclick="selectRequest('${r.birthKey}')">
      <div>
        <div class="req-name">${r.name}${r.kana?` <span style="font-size:10px;opacity:.6;">${r.kana}</span>`:''}</div>
        <div class="req-sub">${r.birthKey}　${r.theme||'テーマ未記入'}</div>
        <div class="req-sub">依頼：${fmtDate(r.requestedAt)||'直接追加'}</div>
      </div>
      <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <span class="badge ${STATUS_CLASS[r.status]||'badge-unpaid'}">${STATUS_LABEL[r.status]||'未入金'}</span>
        ${r.ryuList?.length?`<span style="font-size:10px;color:rgba(200,168,75,0.5);">龍 ${r.ryuList.length}体</span>`:''}
      </div>
    </div>`).join('');
}

function selectRequest(birthKey){
  currentBirthKey=birthKey;
  const list=window._supabaseList||[];
  const r=list.find(x=>x.birthKey===birthKey);
  if(!r){renderList();return;}
  document.getElementById('detail-empty').style.display='none';
  document.getElementById('detail-panel').style.display='block';
  document.getElementById('detail-info').innerHTML=
    `<span style="color:var(--gold2);font-weight:500;">${r.name}</span>${r.kana?' '+r.kana:''}　${r.birthKey}<br>
     テーマ：${r.theme||'未記入'}　連絡先：${r.contact||'未記入'}<br>
     ステータス：<span class="badge ${STATUS_CLASS[r.status]}">${STATUS_LABEL[r.status]}</span>`;
  // 龍データ復元
  ryuRows=[];
  (r.ryuList||r.ryu_list||[]).forEach(row=>ryuRows.push({...row}));
  renderRyuTable();
  document.getElementById('ryu-date').value=r.ryuDate||r.ryu_date||'';
  document.getElementById('ryu-message').value=r.ryuMessage||r.ryu_message||'';
  // 通常鑑定文
  document.getElementById('edit-theme').value=r.editTheme||r.edit_theme||r.theme||'';
  document.getElementById('edit-text').value=r.text||'';
  setMode(r.mode||'ryu');
}

// ══════════════════════
// 鑑定モード切替
// ══════════════════════
function setMode(m){
  currentMode=m;
  document.getElementById('mode-ryu').classList.toggle('active',m==='ryu');
  document.getElementById('mode-text').classList.toggle('active',m==='text');
  document.getElementById('ryu-panel').style.display=m==='ryu'?'block':'none';
  document.getElementById('text-panel').style.display=m==='text'?'block':'none';
}

// ══════════════════════
// 龍テーブル管理
// ══════════════════════
let ryuRows=[];

function addRyu(){
  if(ryuRows.length>=42){toast('最大42体です');return;}
  // 最初の色（透明）の能力値を初期値として設定
  const c=RYU_COLORS[0];
  ryuRows.push({colorIdx:0,en:c.en,ki:c.ki,iy:c.iy,jo:c.jo,ke:c.ke,eg:c.eg});
  renderRyuTable();
}

function removeRyu(i){
  ryuRows.splice(i,1);
  renderRyuTable();
}

function onColorChange(i,idx){
  const c=RYU_COLORS[idx];
  ryuRows[i]={colorIdx:parseInt(idx),en:c.en,ki:c.ki,iy:c.iy,jo:c.jo,ke:c.ke,eg:c.eg};
  renderRyuTable();
}

function renderRyuTable(){
  const tbody=document.getElementById('ryu-tbody');
  const count=ryuRows.length;
  document.getElementById('ryu-count-label').textContent=`現在 ${count} 体`;
  document.getElementById('ryu-add-btn').disabled=count>=42;

  if(!count){
    tbody.innerHTML=`<tr><td colspan="10" style="text-align:center;padding:16px;color:rgba(200,168,75,0.4);font-size:12px;">「龍を追加する」ボタンで龍を追加してください</td></tr>`;
    return;
  }

  tbody.innerHTML=ryuRows.map((row,i)=>{
    const c=RYU_COLORS[row.colorIdx]||RYU_COLORS[0];
    const textColor=getTextColor(c.hex);
    const opts=RYU_COLORS.map((rc,ri)=>`<option value="${ri}"${ri===row.colorIdx?' selected':''}>${rc.name}</option>`).join('');
    const numStyle='width:36px;text-align:center;background:rgba(255,255,255,0.04);border:0.5px solid rgba(200,168,75,0.2);color:var(--parch2);font-size:12px;padding:4px;font-family:inherit;';
    return `<tr>
      <td>${i+1}</td>
      <td>
        <select class="ryu-sel" onchange="onColorChange(${i},this.value)">
          ${opts}
        </select>
      </td>
      <td>
        <div class="ryu-color-cell" style="background:${c.hex};color:${textColor};">${c.name}</div>
      </td>
      <td><input type="number" style="${numStyle}" value="${row.en}" min="0" max="10" onchange="ryuRows[${i}].en=+this.value"></td>
      <td><input type="number" style="${numStyle}" value="${row.ki}" min="0" max="10" onchange="ryuRows[${i}].ki=+this.value"></td>
      <td><input type="number" style="${numStyle}" value="${row.iy}" min="0" max="10" onchange="ryuRows[${i}].iy=+this.value"></td>
      <td><input type="number" style="${numStyle}" value="${row.jo}" min="0" max="10" onchange="ryuRows[${i}].jo=+this.value"></td>
      <td><input type="number" style="${numStyle}" value="${row.ke}" min="0" max="10" onchange="ryuRows[${i}].ke=+this.value"></td>
      <td><input type="number" style="${numStyle}" value="${row.eg}" min="0" max="10" onchange="ryuRows[${i}].eg=+this.value"></td>
      <td><button class="ryu-del" onclick="removeRyu(${i})">✕</button></td>
    </tr>`;
  }).join('');
}

// ══════════════════════
// 保存・ステータス変更・提供・削除
// ══════════════════════
function getKanteishiData(){
  const list=window._supabaseList||[];
  const r=list.find(x=>x.birthKey===currentBirthKey);
  return r||{};
}
function saveKanteishi(){
  if(!currentBirthKey){toast('依頼を選択してください');return;}
  const existing=getKanteishiData();
  const list=buildMasterList();
  const r=list.find(x=>x.birthKey===currentBirthKey);
  const mode=currentMode;
  let newStatus=r?.status||'unpaid';
  if(newStatus==='paid')newStatus='written';
  else if(!['unpaid','written','provided'].includes(newStatus))newStatus='written';

  const updateData={
    name:r?.name||'',
    kana:r?.kana||'',
    theme:r?.theme||'',
    mode,
    ryu_list:mode==='ryu'?ryuRows:[],
    ryu_date:mode==='ryu'?document.getElementById('ryu-date').value:'',
    ryu_message:mode==='ryu'?document.getElementById('ryu-message').value:'',
    edit_theme:document.getElementById('edit-theme').value,
    text:mode==='text'?document.getElementById('edit-text').value:'',
    status:newStatus,
  };
  // Supabaseに保存
  fetch('https://unmei-chatwork.mitzuryu-happinessroom.workers.dev/supabase/update',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({birth_key:currentBirthKey,...updateData})
  }).then(()=>{
    toast(`保存しました（ステータス：${STATUS_LABEL[newStatus]}）`);
    const saved2=[...ryuRows];
    renderList().then(()=>{ryuRows=saved2;renderRyuTable();});
  }).catch(e=>{console.log('Supabase update error',e);toast('保存失敗：'+e.message);});
}

function changeStatus(status){
  if(!currentBirthKey)return;
  const existing=getKanteishiData();
  fetch('https://unmei-chatwork.mitzuryu-happinessroom.workers.dev/supabase/update',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({birth_key:currentBirthKey,status})
  }).catch(e=>console.log('Supabase update error',e));
  toast(`ステータスを「${STATUS_LABEL[status]}」に変更しました`);
  selectRequest(currentBirthKey);renderList();
}

function provideKanteishi(){
  if(!currentBirthKey){toast('依頼を選択してください');return;}
  const existing=getKanteishiData();
  const mode=currentMode;
  if(mode==='ryu'&&!ryuRows.length){toast('龍を1体以上追加してください');return;}
  if(mode==='text'&&!document.getElementById('edit-text').value.trim()){toast('鑑定文を入力してください');return;}
  const list=buildMasterList();
  const r=list.find(x=>x.birthKey===currentBirthKey);
  const provideData={
    name:r?.name||'',
    kana:r?.kana||'',
    mode,
    ryu_list:mode==='ryu'?ryuRows:[],
    ryu_date:mode==='ryu'?document.getElementById('ryu-date').value:'',
    ryu_message:mode==='ryu'?document.getElementById('ryu-message').value:'',
    edit_theme:document.getElementById('edit-theme').value,
    text:mode==='text'?document.getElementById('edit-text').value:'',
    status:'provided',
    date:new Date().toLocaleDateString('ja-JP'),
  };
  fetch('https://unmei-chatwork.mitzuryu-happinessroom.workers.dev/supabase/update',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({birth_key:currentBirthKey,...provideData})
  }).then(()=>{
    toast('✦ 鑑定文を提供しました');
    const saved=[...ryuRows];
    renderList().then(()=>{ryuRows=saved;renderRyuTable();});
  }).catch(e=>{console.log('Supabase update error',e);toast('提供失敗：'+e.message);});
}

function deleteRequest(){
  if(!currentBirthKey)return;
  if(!confirm('この依頼を削除しますか？'))return;
  fetch('https://unmei-chatwork.mitzuryu-happinessroom.workers.dev/supabase/delete',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({birth_key:currentBirthKey})
  }).catch(e=>console.log('Supabase delete error',e));
  currentBirthKey=null;ryuRows=[];
  document.getElementById('detail-empty').style.display='block';
  document.getElementById('detail-panel').style.display='none';
  toast('削除しました');renderList();
}

function addRequest(){
  const name=document.getElementById('t-name').value.trim();
  const kana=document.getElementById('t-kana').value.trim();
  const birth=document.getElementById('t-birth').value;
  const theme=document.getElementById('t-theme').value;
  const contact=document.getElementById('t-contact').value;
  if(!birth){toast('生年月日を入力してください');return;}
  fetch('https://unmei-chatwork.mitzuryu-happinessroom.workers.dev/supabase/request',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({birth_key:birth,name:name||'未記入',birth,kana,contact,theme,status:'unpaid'})
  }).then(()=>{toast('依頼を追加しました');renderList();})
  .catch(e=>{console.log('Supabase add error',e);toast('追加失敗：'+e.message);});
}

// ══════════════════════
// 設定
// ══════════════════════
function saveSettings(){
  localStorage.setItem('kanteishi_setting',JSON.stringify({
    cwToken:document.getElementById('cw-token').value,
    cwRoom:document.getElementById('cw-room').value,
    ejService:document.getElementById('ej-service').value,
    ejTemplate:document.getElementById('ej-template').value,
    ejKey:document.getElementById('ej-key').value,
  }));
  toast('設定を保存しました');
}
function loadSettings(){
  const s=JSON.parse(localStorage.getItem('kanteishi_setting')||'{}');
  if(s.cwToken)document.getElementById('cw-token').value=s.cwToken;
  if(s.cwRoom)document.getElementById('cw-room').value=s.cwRoom;
  if(s.ejService)document.getElementById('ej-service').value=s.ejService;
  if(s.ejTemplate)document.getElementById('ej-template').value=s.ejTemplate;
  if(s.ejKey)document.getElementById('ej-key').value=s.ejKey;
}
function getSettings(){return JSON.parse(localStorage.getItem('kanteishi_setting')||'{}');}

async function notifyChatwork(message){
  const workerUrl=window.CW_WORKER_URL||'';
  if(!workerUrl){toast('Chatwork Worker URL未設定');return;}
  try{
    const res=await fetch(workerUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message})
    });
    if(res.ok){toast('Chatwork通知を送信しました');}
    else{toast('Chatwork送信失敗（ステータス：'+res.status+'）');}
  }catch(e){
    toast('Chatwork通知失敗：'+e.message);
    console.log('Chatwork error:',e);
  }
}
async function testChatwork(){await notifyChatwork('[命鏡テスト通知]\n'+new Date().toLocaleString('ja-JP'));}
// Chatwork Worker URL（Cloudflare WorkerのURL）
window.CW_WORKER_URL = 'https://unmei-chatwork.mitzuryu-happinessroom.workers.dev';
